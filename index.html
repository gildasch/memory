<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Memory / Snap Turn</p>
          <h1>memory</h1>
        </div>
        <button class="ghost-button" id="new-game" type="button">New game</button>
      </header>

      <section class="intro">
        <p>
          Minimal tabletop memory. Quiet surfaces, discreet text, one crisp flip animation.
        </p>
      </section>

      <section class="hud" aria-label="Game status">
        <article class="hud__item">
          <span class="hud__label">Moves</span>
          <strong class="hud__value" id="moves">0</strong>
        </article>
        <article class="hud__item">
          <span class="hud__label">Pairs left</span>
          <strong class="hud__value" id="pairs-left">8</strong>
        </article>
        <article class="hud__item">
          <span class="hud__label">Time</span>
          <strong class="hud__value" id="timer">00:00</strong>
        </article>
      </section>

      <section class="board-wrap">
        <div class="board-copy">
          <p class="section-label">Play</p>
          <p class="board-copy__text" id="status">
            Find all matching pairs. Cards flip with a slight left or right bias, but stay inside
            the grid.
          </p>
        </div>
        <section class="board" id="board" aria-label="Memory board"></section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
