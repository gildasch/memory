<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" data-sidebar-open="false">
      <aside class="player-sidebar" aria-label="Current player">
        <p class="player-sidebar__text" id="player-banner-text">Player 1 · 0 turns</p>
      </aside>

      <button
        class="sidebar-toggle"
        id="sidebar-toggle"
        type="button"
        aria-controls="sidebar-panel"
        aria-expanded="false"
        aria-label="Open menu"
        title="Open menu"
      >
        <svg class="icon icon--chevron" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 6l6 6-6 6" />
        </svg>
      </button>

      <aside class="menu-drawer" aria-label="Game controls">
        <div class="sidebar__panel" id="sidebar-panel">
          <section class="sidebar__section sidebar__section--actions">
            <button class="icon-button" id="new-game" type="button" aria-label="Start a new game" title="New game">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 11a8 8 0 10-2.34 5.66" />
                <path d="M20 4v7h-7" />
              </svg>
            </button>
            <button
              class="icon-button"
              id="theme-mode-toggle"
              type="button"
              aria-pressed="false"
              aria-label="Switch color mode"
              title="Switch color mode"
            >
              <svg class="icon icon--sun" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4.5" />
                <path d="M12 2v2.5M12 19.5V22M4.93 4.93l1.77 1.77M17.3 17.3l1.77 1.77M2 12h2.5M19.5 12H22M4.93 19.07l1.77-1.77M17.3 6.7l1.77-1.77" />
              </svg>
              <svg class="icon icon--moon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20.4 14.5A8.5 8.5 0 119.5 3.6a6.9 6.9 0 0010.9 10.9z" />
              </svg>
            </button>
          </section>

          <section class="sidebar__section controls" aria-label="Game setup">
            <p class="section-label">Setup</p>
            <label class="field">
              <span class="field__label">Players</span>
              <select class="field__control" id="players-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
              </select>
            </label>
            <label class="field">
              <span class="field__label">Theme</span>
              <select class="field__control" id="theme-select"></select>
            </label>
            <label class="field">
              <span class="field__label">Pairs</span>
              <select class="field__control" id="pairs-select"></select>
            </label>
          </section>

          <section class="sidebar__section hud" aria-label="Game status">
            <article class="hud__item">
              <span class="hud__label">Moves</span>
              <strong class="hud__value" id="moves">0</strong>
            </article>
            <article class="hud__item">
              <span class="hud__label">Pairs left</span>
              <strong class="hud__value" id="pairs-left">8</strong>
            </article>
            <article class="hud__item">
              <span class="hud__label">Time</span>
              <strong class="hud__value" id="timer">00:00</strong>
            </article>
          </section>

          <section class="sidebar__section sidebar__section--status">
            <p class="section-label">Status</p>
            <p class="status-copy" id="status">
              Find all matching pairs. Cards flip with a slight left or right bias, but stay
              inside the grid.
            </p>
          </section>
        </div>
      </aside>

      <section class="board-stage">
        <section class="board" id="board" aria-label="Memory board"></section>
      </section>
    </main>

    <script src="./theme-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
