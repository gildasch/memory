<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" data-sidebar-open="false">
      <aside class="sidebar" aria-label="Game controls">
        <div class="sidebar__rail">
          <button
            class="sidebar-toggle"
            id="sidebar-toggle"
            type="button"
            aria-controls="sidebar-panel"
            aria-expanded="false"
          >
            Menu
          </button>
        </div>

        <div class="sidebar__panel" id="sidebar-panel">
          <section class="sidebar__section sidebar__section--actions">
            <button class="ghost-button" id="new-game" type="button">New game</button>
            <button class="ghost-button" id="theme-mode-toggle" type="button" aria-pressed="false">
              Dark mode
            </button>
          </section>

          <section class="sidebar__section controls" aria-label="Game setup">
            <p class="section-label">Setup</p>
            <label class="field">
              <span class="field__label">Theme</span>
              <select class="field__control" id="theme-select"></select>
            </label>
            <label class="field">
              <span class="field__label">Pairs</span>
              <select class="field__control" id="pairs-select"></select>
            </label>
          </section>

          <section class="sidebar__section hud" aria-label="Game status">
            <article class="hud__item">
              <span class="hud__label">Moves</span>
              <strong class="hud__value" id="moves">0</strong>
            </article>
            <article class="hud__item">
              <span class="hud__label">Pairs left</span>
              <strong class="hud__value" id="pairs-left">8</strong>
            </article>
            <article class="hud__item">
              <span class="hud__label">Time</span>
              <strong class="hud__value" id="timer">00:00</strong>
            </article>
          </section>

          <section class="sidebar__section sidebar__section--status">
            <p class="section-label">Status</p>
            <p class="status-copy" id="status">
              Find all matching pairs. Cards flip with a slight left or right bias, but stay
              inside the grid.
            </p>
          </section>
        </div>
      </aside>

      <section class="board-stage">
        <section class="board" id="board" aria-label="Memory board"></section>
      </section>
    </main>

    <script src="./theme-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
